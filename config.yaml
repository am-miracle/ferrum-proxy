server:
  port: 8080
  host: 0.0.0.0
  graceful_shutdown_timeout_ms: 30000
  client_header_timeout_ms: 10000
  client_body_timeout_ms: 15000

routes:
  - path_prefix: /api
    backends:
      - http://127.0.0.1:3001
      - http://127.0.0.1:3002
      - http://127.0.0.1:3003

  - path_prefix: /static
    backends:
      - http://127.0.0.1:4000

health_check:
  interval_sec: 10
  endpoint: /health

upstream:
  connect_timeout_ms: 3000
  read_timeout_ms: 15000
  max_request_body_bytes: 16777216
  max_response_body_bytes: 67108864
